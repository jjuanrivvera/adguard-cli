site_name: AdGuard CLI
site_url: https://jjuanrivvera.github.io/adguard-cli/
site_description: The missing command-line interface for AdGuard Home
site_author: Juan Rivera

repo_name: jjuanrivvera/adguard-cli
repo_url: https://github.com/jjuanrivvera/adguard-cli
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - search.highlight
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/jjuanrivvera/adguard-cli
  generator: false

nav:
  - Home: index.md
  - Getting Started:
    - getting-started/index.md
    - Installation: getting-started/installation.md
    - Configuration: getting-started/configuration.md
    - Quick Start: getting-started/quickstart.md
  - User Guide:
    - user-guide/index.md
    - Output Formats: user-guide/output-formats.md
    - Multi-Instance: user-guide/multi-instance.md
    - Security: user-guide/security.md
  - Commands: commands/index.md
  - Development:
    - development/index.md
    - Architecture: development/architecture.md
    - Contributing: development/contributing.md
