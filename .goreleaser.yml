version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: adguard-home
    main: ./cmd/adguard-home
    binary: adguard-home
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: Performance
      regexp: '^.*?perf(\([[:word:]]+\))??!?:.+$'
      order: 2
    - title: Others
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^ci:"

brews:
  - name: adguard-cli
    repository:
      owner: jjuanrivvera
      name: homebrew-adguard-cli
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/jjuanrivvera/adguard-cli"
    description: "The missing command-line interface for AdGuard Home"
    license: "MIT"
    install: |
      bin.install "adguard-home"
    test: |
      system "#{bin}/adguard-home", "--version"

release:
  github:
    owner: jjuanrivvera
    name: adguard-cli
  prerelease: auto
  name_template: "v{{.Version}}"
